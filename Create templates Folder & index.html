<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSE Stock Backtester</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f23; color: #e0e0e0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 10px; margin-bottom: 30px; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; background: #1a1a2e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, select, button { padding: 10px; border: none; border-radius: 5px; font-size: 14px; }
        input, select { background: #2d2d44; color: #e0e0e0; }
        button { background: #667eea; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #764ba2; }
        .results { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .metric { background: #1a1a2e; padding: 20px; border-radius: 8px; border-left: 4px solid #667eea; }
        .metric h3 { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 10px; }
        .metric .value { font-size: 28px; font-weight: bold; color: #667eea; }
        .positive { color: #4caf50; }
        .negative { color: #f44336; }
        .chart-container { background: #1a1a2e; padding: 20px; border-radius: 8px; margin-bottom: 20px; position: relative; height: 500px; }
        canvas { max-height: 450px; }
        .signals { background: #1a1a2e; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #667eea; color: white; }
        tr:hover { background: #2d2d44; }
        .buy { color: #4caf50; font-weight: bold; }
        .sell { color: #f44336; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 NSE Stock Backtester</h1>
            <p>Backtest trading strategies on Nifty 50, 100, 500 stocks</p>
        </header>

        <div class="controls">
            <div>
                <label>Stock Category</label>
                <select id="category">
                    <option value="NIFTY_50">Nifty 50</option>
                    <option value="NIFTY_100">Nifty 100</option>
                </select>
            </div>
            <div>
                <label>Stock Symbol</label>
                <select id="symbol">
                    <option>Select a stock...</option>
                </select>
            </div>
            <div>
                <label>Strategy</label>
                <select id="strategy">
                    <option value="rsi">RSI Strategy</option>
                    <option value="ma_crossover">MA Crossover</option>
                    <option value="vwap">VWAP Strategy</option>
                </select>
            </div>
            <div>
                <label>Start Date</label>
                <input type="date" id="startDate" value="2023-01-01">
            </div>
            <div>
                <label>End Date</label>
                <input type="date" id="endDate" value="2024-01-01">
            </div>
            <button onclick="runBacktest()">Run Backtest</button>
        </div>

        <div class="results" id="results"></div>

        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="signals">
            <h2>Trading Signals</h2>
            <table id="signalsTable">
                <thead>
                    <tr><th>Date</th><th>Signal</th><th>Price</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let priceChart = null;

        // Load stocks when category changes
        document.getElementById('category').addEventListener('change', async (e) => {
            const category = e.target.value;
            const response = await fetch(`/api/stocks/${category}`);
            const stocks = await response.json();
            const select = document.getElementById('symbol');
            select.innerHTML = stocks.map(s => `<option>${s}</option>`).join('');
        });

        // Initialize
        document.getElementById('category').dispatchEvent(new Event('change'));

        // Set default dates
        const today = new Date();
        const oneYearAgo = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
        document.getElementById('endDate').valueAsDate = today;
        document.getElementById('startDate').valueAsDate = oneYearAgo;

        async function runBacktest() {
            const symbol = document.getElementById('symbol').value;
            const strategy = document.getElementById('strategy').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            const response = await fetch('/api/backtest', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ symbol, strategy, start_date: startDate, end_date: endDate })
            });

            const result = await response.json();

            if (result.error) {
                alert('Error: ' + result.error);
                return;
            }

            // Display metrics
            displayResults(result.results);

            // Display chart
            displayChart(result.data);

            // Display signals
            displaySignals(result.signals);
        }

        function displayResults(results) {
            const html = `
                <div class="metric">
                    <h3>Total Return</h3>
                    <div class="value ${results.total_return > 0 ? 'positive' : 'negative'}">
                        ${results.total_return}%
                    </div>
                </div>
                <div class="metric">
                    <h3>Total Trades</h3>
                    <div class="value">${results.total_trades}</div>
                </div>
                <div class="metric">
                    <h3>Win Rate</h3>
                    <div class="value">${results.win_rate}%</div>
                </div>
                <div class="metric">
                    <h3>Entry Price</h3>
                    <div class="value">₹${results.start_price}</div>
                </div>
                <div class="metric">
                    <h3>Exit Price</h3>
                    <div class="value">₹${results.end_price}</div>
                </div>
            `;
            document.getElementById('results').innerHTML = html;
        }

        function displayChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (priceChart) priceChart.destroy();

            const keys = Object.keys(data.Close);
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: keys.map((k, i) => i % 5 === 0 ? k : ''),
                    datasets: [
                        {
                            label: 'Close Price',
                            data: Object.values(data.Close),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.1,
                            fill: true
                        },
                        {
                            label: 'SMA 20',
                            data: Object.values(data.SMA_20),
                            borderColor: '#ff9800',
                            borderWidth: 2,
                            fill: false
                        },
                        {
                            label: 'SMA 50',
                            data: Object.values(data.SMA_50),
                            borderColor: '#f44336',
                            borderWidth: 2,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#e0e0e0' } } },
                    scales: {
                        y: { ticks: { color: '#999' }, grid: { color: '#333' } },
                        x: { ticks: { color: '#999' }, grid: { color: '#333' } }
                    }
                }
            });
        }

        function displaySignals(signals) {
            const tbody = document.querySelector('#signalsTable tbody');
            tbody.innerHTML = signals.map(s => `
                <tr>
                    <td>${new Date(s.date).toLocaleDateString()}</td>
                    <td class="${s.signal.toLowerCase()}">${s.signal}</td>
                    <td>₹${s.price.toFixed(2)}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
